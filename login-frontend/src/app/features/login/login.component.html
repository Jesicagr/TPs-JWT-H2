<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg border-0 rounded-4 p-4" style="width: 100%; max-width: 400px;">
    
    <div class="text-center mb-4">
      <i class="bi bi-person-lock fs-1 text-primary"></i>
      <h2 class="fw-bold">Iniciar Sesión</h2>
      <p class="text-muted">Accede a tu panel de control</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuario</label>
        <input type="text" 
               formControlName="username" 
               class="form-control rounded-3" 
               [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
               placeholder="Tu nombre de usuario">
        
        <div class="invalid-feedback">
          El usuario es requerido (mínimo 3 caracteres).
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Contraseña</label>
        <input type="password" 
               formControlName="password" 
               class="form-control rounded-3" 
               [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
               placeholder="••••••••">
        <div class="invalid-feedback">
          La contraseña debe tener al menos 4 caracteres.
        </div>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger py-2 small animate__animated animate__shakeX">
        <i class="bi bi-exclamation-circle me-2"></i> {{ errorMessage }}
      </div>

      <button type="submit" 
              class="btn btn-primary w-100 py-2 fw-bold rounded-3 mt-3" 
              [disabled]="loginForm.invalid">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>

    </form>
  </div>
</div>
