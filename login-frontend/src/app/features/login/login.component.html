<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg border-0 rounded-4 p-4" style="width: 100%; max-width: 400px;">
    
    <div class="text-center mb-4">
      <i class="bi bi-person-lock fs-1 text-primary"></i>
      <h2 class="fw-bold">Iniciar Sesión</h2>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="mb-3 position-relative">
        <label class="form-label fw-semibold">Usuario</label>
        <div class="input-group">
          <input type="text" 
                 formControlName="username" 
                 class="form-control rounded-3" 
                 [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
                 placeholder="Tu nombre de usuario">
          
          <span *ngIf="loginForm.get('username')?.pending" class="input-group-text bg-transparent border-0 position-absolute end-0" style="z-index: 5;">
            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
          </span>
        </div>
        
        <div *ngIf="loginForm.get('username')?.hasError('userNotFound') && loginForm.get('username')?.touched" class="text-danger small mt-1">
          <i class="bi bi-exclamation-circle me-1"></i> El usuario no existe.
        </div>
        <div class="invalid-feedback">El usuario es requerido (mínimo 3 caracteres).</div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Contraseña</label>
        <input type="password" formControlName="password" class="form-control rounded-3" 
               [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        <div class="invalid-feedback">La contraseña es obligatoria.</div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold rounded-3 mt-3" [disabled]="loginForm.invalid">
        Entrar
      </button>

    </form> </div>
</div>
