<div class="container">
  <header class="mb-5 text-center">
    <h2 class="fw-bold display-6">Nuestros Productos</h2>
    <p class="text-muted lead">Calidad garantizada al mejor precio</p>
  </header>

  <div class="alert alert-primary shadow-sm border-0 rounded-3 mb-4 d-flex align-items-center animate__animated animate__fadeIn" *ngIf="wsService.lastMessage">
    <i class="bi bi-lightning-fill fs-4 me-3"></i>
    <div>
      <h6 class="m-0 fw-bold">Actualización en tiempo real:</h6>
      <p class="m-0 small">{{ wsService.lastMessage }}</p>
    </div>
  </div>

  <div *ngIf="mensajeNotificacion" class="alert alert-success shadow-sm border-0 rounded-3 animate__animated animate__fadeIn">
    <i class="bi bi-check-circle-fill me-2"></i> {{ mensajeNotificacion }}
  </div>
  
  <div class="row g-4">
    <div class="col-12 col-md-6 col-lg-4" *ngFor="let p of productos()">
      <div class="card h-100 border-0 shadow-sm custom-card">
        <div class="card-body d-flex flex-column">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <h5 class="card-title fw-bold m-0 text-truncate" style="max-width: 70%;">{{ p.name }}</h5>
            <span class="badge bg-soft-primary text-primary rounded-pill fw-bold fs-6">
              $ {{ p.price }}
            </span>
          </div>
          
          <p class="card-text text-muted small mb-4 flex-grow-1">
            Descripción breve del producto para darle cuerpo a la tarjeta y que todas tengan el mismo alto.
          </p>
          
          <button (click)="comprar(p)" class="btn btn-primary mt-auto w-100 rounded-3 py-2 fw-bold d-flex align-items-center justify-content-center">
            <i class="bi bi-cart-plus fs-5 me-2"></i>Añadir al carrito
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
