<div class="registro-card">
  <h2>Crear Cuenta</h2>
  
  <form [formGroup]="registroForm" (ngSubmit)="registrar()">
    
    <div class="form-group">
      <label>Nombre de Usuario</label>
      <input type="text" formControlName="username" class="modern-input" placeholder="Ej: admin">
      
      <div class="feedback-container">
        
        <span *ngIf="usernameControl?.status === 'PENDING'" class="status-pending">
          <div class="spinner"></div> Verificando disponibilidad...
        </span>
        
        <span *ngIf="usernameControl?.hasError('valueAlreadyExists')" class="status-error">
          Este usuario ya está en uso.
        </span>

        <span *ngIf="usernameControl?.hasError('minlength') && usernameControl?.touched" class="status-error">
          Mínimo 4 caracteres.
        </span>
        
        <span *ngIf="usernameControl?.status === 'VALID' && usernameControl?.value" class="status-success">
          Usuario disponible.
        </span>
      </div>
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" formControlName="password" class="modern-input" placeholder="••••••••">
    </div>

    <button type="submit" class="modern-btn" [disabled]="registroForm.invalid || registroForm.pending">
      Registrarse
    </button>
  </form>
</div>
